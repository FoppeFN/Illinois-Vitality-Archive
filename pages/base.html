<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}IVA{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'forest-green': '#115e59',
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<style>
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url('/static/images/SIUE.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.07;
        z-index: -1;
    }
</style>

<body class="bg-gray-50 font-sans">

    <!-- TOP GREEN BANNER -->
    <header class="bg-forest-green text-white shadow-md">
        <div class="mx-auto max-w-6xl px-6 py-1 flex items-center justify-between">

            <!-- Left: Title -->
            <div>
                <h1 class="text-2xl font-bold tracking-wide">
                    <a href="{% url 'home_page' %}" class="hover:opacity-90">IVA</a>
                </h1>
                <p class="text-sm text-emerald-100">
                    Illinois Vitality Archive
                </p>
            </div>

            <!-- Right: Illinois Outline Image -->
            {# Put the image at: static/images/illinois-outline.png #}
            <div class="hidden md:block">
                <img src="/static/images/illinois-outline.png"
                     alt="Illinois Outline"
                     class="h-20 opacity-90">
            </div>
        </div>

        <!-- NAV BAR -->
        <div class="bg-emerald-900/30">
            <nav class="mx-auto max-w-6xl px-6 py-2 flex gap-6 text-sm font-medium">
                <a href="{% url 'home_page' %}" class="text-emerald-100 hover:text-white">Home</a>
                <a href="{% url 'search_birth_records' %}" class="text-emerald-100 hover:text-white">Birth</a>
                <a href="{% url 'search_death_records' %}" class="text-emerald-100 hover:text-white">Death</a>
                <a href="{% url 'search_marriage_records' %}" class="text-emerald-100 hover:text-white">Marriage</a>
                <a href="{% url 'our_mission' %}" class="text-emerald-100 hover:text-white">Our Mission</a>
                <a href="{% url 'glossary' %}" class="text-emerald-100 hover:text-white">Glossary</a>
            </nav>
        </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="container mx-auto p-8 max-w-4xl">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
