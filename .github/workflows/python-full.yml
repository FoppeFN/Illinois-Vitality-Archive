name: Full Python Quality Gates

on:
  push:
    branches: ["main", "marquis-branch"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: IIVRDAPPDB
          POSTGRES_USER: IIVRDUSER
          POSTGRES_PASSWORD: IIVRDPASSWORDSECRET
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U IIVRDUSER -d IIVRDAPPDB"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      POSTGRES_DB: IIVRDAPPDB
      POSTGRES_USER: IIVRDUSER
      POSTGRES_PASSWORD: IIVRDPASSWORDSECRET
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      DJANGO_SECRET_KEY: CI_SECRET_KEY
      DJANGO_DEBUG: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: |
          python manage.py migrate

      - name: Run Ruff lint
        run: |
          ruff check .

      - name: Run Ruff format check
        run: |
          ruff format --check .

      - name: Run mypy
        run: |
          mypy . || true

      - name: Run Bandit
        run: |
          bandit -r . -c bandit.yaml || true

      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage report --fail-under=50
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml